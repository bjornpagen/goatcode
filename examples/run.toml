# run.toml — the CLI's run config (docs/architecture/70-api.md § the CLI).
#
# `goat plan` and `goat run` parse this file once, at bind time: a missing
# required key, a mistyped value, an unknown provider in a pin, or a
# missing API key for a pinned provider is a typed error BEFORE any node
# runs — never a mid-chase surprise.
#
# The subset is deliberate. Two knobs the docs name are absent by ruling:
# per-shape speculation off switches (a switch requires ledger-derived
# churn evidence and is unconstructible from config text — doc rule 8)
# and merge functions (v0 ships the registry empty; 50-commit.md § OPEN
# items).

# --- Required paths --------------------------------------------------
#
# Self-contained by design: everything this example touches lives under
# ./.goat/ — never the repository the operator happens to stand in (a
# `repo = "."` would commit a goat-committed branch into it and let the
# swarm write the operator's own tree; a wave-3 finding burned on the
# ambient-cwd cousin of this mistake).
#
# One-time setup — goat never runs git for you (workers are banned from
# git, and the harness only ever writes the committed branch; creating
# your repo is your act):
#
#   mkdir -p .goat/demo-repo
#   git -C .goat/demo-repo init -q
#   git -C .goat/demo-repo commit --allow-empty -m "goat demo root"

# The git repository holding the committed branch — the ONE shared tree
# every node reads and writes (the flat org, README.md § design of
# record vs shipped engine). Retirement is the only writer of committed
# state, and git is its storage engine: blobs land in its object
# database at store time, retirements are commits.
repo = ".goat/demo-repo"

# The branch retirements commit to. Created on first run if absent.
committed_branch = "goat-committed"

# Unused since migration row 4 (nodes dispatch with no worktree; stores
# land in the shared tree). Still parsed; the key dies with row 5
# (README.md § design of record vs shipped engine).
worktree_root = ".goat/demo-repo/.goat-worktrees"

# The append-only event ledger. Created on run open; read back by
# `goat report`, `goat explain`, `goat replay`. One run per ledger: an
# existing file at this path is refused (choose a fresh path — never
# truncated).
ledger_path = ".goat/ledger.bin"

# --- Scheduling ------------------------------------------------------

# The default port every executor binding names. Ports are structural
# hazards, declared, never defaulted to a bound: an undeclared port is
# open (no concurrency limit), per the house posture
# (40-scheduling.md § ports and priority).
port = "agents"

# A bounded port requires its documented bottleneck named — a bare limit
# does not parse (Chase.Port.bounded). Declare one per real ceiling:
#
# [[ports]]
# name = "anthropic"
# limit = 4
# bottleneck = "provider concurrency ceiling, tier 2 key"

# --- Backstops (40-scheduling.md § backstops) ------------------------

# Per-run ceiling on tokens spent under undischarged hypotheses. At the
# ceiling only witnessed work admits until discharges catch up. Generous
# by default; a run where it binds is reported as an anomaly.
token_ceiling = 2000000

# Chain confidence below which reads suspend instead of hypothesizing.
confidence_floor = 0.25

# --- The repair lane (60-agents.md § validate and repair) ------------

# Repair attempts after the initial turn: budget = initial + N repairs.
repair_attempts = 3

# --- The planner pin (goat plan; 60-agents.md § model pins) ----------

# The planner is judgment-heavy work and pins the strongest available
# model. Provider must be "anthropic" or "openai"; the matching API key
# (ANTHROPIC_API_KEY / OPENAI_API_KEY) must be exported.
planner_provider = "anthropic"
planner_model = "claude-fable-5"
